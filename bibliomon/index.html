<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliomon - MMU Library RPG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Phaser will insert the <canvas> here automatically -->
        <input type="text" id="nameInput"
               style="position:absolute; top:45%; left:50%;
                      transform:translate(-50%,-50%);
                      font-family:monospace; font-size:14px; padding:6px;
                      background:#000; color:#fff;
                      border:2px solid #fff; display:none; z-index:10;
                      text-align:center;"
               maxlength="12" />
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="js/data/moves.js"></script>
    <script src="js/data/books.js"></script>
    <script src="js/data/items.js"></script>
    <script src="js/data/maps.js"></script>
    <script src="js/data/trainers.js"></script>
    <script src="js/data/types.js"></script>
    <script src="js/scenes/BootScene.js"></script>
    <script src="js/scenes/TitleScene.js"></script>
    <script src="js/scenes/MenuScene.js"></script>
    <script src="js/data/battleLogic.js"></script>
    <script src="js/scenes/BattleScene.js"></script>
    <script src="js/engine/EventQueue.js"></script>
    <script src="js/scenes/OverworldScene.js"></script>
    <script src="js/scenes/DialogueScene.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
